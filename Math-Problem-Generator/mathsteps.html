                                    hasDenominatorX = true;
                                    j += 2;
                                } else if (term[j+1].value === '(' || term[j+1].value === '[' || term[j+1].value === '{') {
                                    const match = findMatchingParenthesis(term, j + 1);
                                    if (match !== -1) {
                                        const innerTokens = term.slice(j + 2, match);
                                        const hasVarInParentheses = innerTokens.some(t => t.type === 'variable');
                                        if (!hasVarInParentheses) {
                                            const innerResult = solveArithmetic(innerTokens, 'zh');
                                            if (innerResult && innerResult.result !== null) {
                                                termDenominator = parseFloat(innerResult.result);
                                                denominatorParentheses = { start: j, end: match };
                                                j = match + 1;
                                                continue;
                                            }
                                        }
                                    }
                                    newTerm.push(term[j]);
                                    j++;
                                } else {
                                    newTerm.push(term[j]);
                                    j++;
                                }
                            } else {
                                newTerm.push(term[j]);
                                j++;
                            }
                        }
                        
                        let multiplier;
                        let applyMultiplier = true;
                        if (lcmInfo.hasX) {
                            if (hasDenominatorX) {
                                multiplier = lcmInfo.number;
                                applyMultiplier = multiplier > 1;
                            } else {
                                const remainingNum = lcmInfo.number / termDenominator;
                                if (remainingNum > 1) {
                                    multiplier = remainingNum + '×x';
                                    applyMultiplier = true;
                                } else if (remainingNum === 1) {
                                    multiplier = 'x';
                                    applyMultiplier = true;
                                } else {
                                    multiplier = '1';
                                    applyMultiplier = false;
                                }
                            }
                        } else {
                            multiplier = lcmInfo.number / termDenominator;
                            applyMultiplier = multiplier > 1;
                        }
                        
                        if (applyMultiplier) {
                            if (newTerm.length > 0) {
                                newTerm.forEach(t => result.push({...t}));
                                result.push({ type: 'operator', value: '×' });
                                if (typeof multiplier === 'string' && multiplier.includes('×')) {
                                    const numPart = parseInt(multiplier.split('×')[0]);
                                    result.push({ type: 'number', value: numPart });
                                    result.push({ type: 'operator', value: '×' });
                                    result.push({ type: 'variable', value: 'x' });
                                } else if (multiplier === 'x') {
                                    result.push({ type: 'variable', value: 'x' });
                                } else {
                                    result.push({ type: 'number', value: multiplier });
                                }
                            } else {
                                if (typeof multiplier === 'string' && multiplier.includes('×')) {
                                    const numPart = parseInt(multiplier.split('×')[0]);
                                    result.push({ type: 'number', value: numPart });
                                    result.push({ type: 'operator', value: '×' });
                                    result.push({ type: 'variable', value: 'x' });
                                } else if (multiplier === 'x') {
                                    result.push({ type: 'variable', value: 'x' });
                                } else {
                                    result.push({ type: 'number', value: multiplier });
                                }
                            }
                        } else {
                            newTerm.forEach(t => result.push({...t}));
                        }
                        
                        if (i < tokens.length) {
                            result.push(tokens[i]);
                            i++;
                        }
                    }
                    
                    return result;
                }
                
                const midLeftStr = buildMultiplyStep(parenthesesCalculated ? calculatedLeftTokens : leftTokens, lcmValue);
                const midRightStr = buildMultiplyStep(parenthesesCalculated ? calculatedRightTokens : rightTokens, lcmValue);
                const midStr = midLeftStr + ' = ' + midRightStr;
                
                const simplifiedLeftStr = buildSimplifiedStep(parenthesesCalculated ? calculatedLeftTokens : leftTokens, lcmInfo);
                const simplifiedRightStr = buildSimplifiedStep(parenthesesCalculated ? calculatedRightTokens : rightTokens, lcmInfo);
                const simplifiedStr = simplifiedLeftStr + ' = ' + simplifiedRightStr;
                
                leftTokens = buildSimplifiedTokens(cloneTokens(parenthesesCalculated ? calculatedLeftTokens : leftTokens), lcmInfo);
                rightTokens = buildSimplifiedTokens(cloneTokens(parenthesesCalculated ? calculatedRightTokens : rightTokens), lcmInfo);
                
                if (parenthesesCalculated) {
                    const calculatedStr = calculatedLeftStr + ' = ' + calculatedRightStr;
                    steps.push({
                        title: t.stepCalculateParentheses,
                        pairs: [
                            { before: beforeStr, after: calculatedStr }
                        ]
                    });
                    
                    steps.push({
                        title: t.stepDenominator,
                        pairs: [
                            { before: calculatedStr, after: midStr },
                            { before: midStr, after: simplifiedStr }
                        ]
                    });
                } else {
                    steps.push({
                        title: t.stepDenominator,
                        pairs: [
                            { before: beforeStr, after: midStr },
                            { before: midStr, after: simplifiedStr }
                        ]
                    });
                }
            }

            function expandParentheses(sideTokens) {
                let result = [];
                let i = 0;
                let expanded = false;
                
                while (i < sideTokens.length) {
                    const isNegativeParen = (sideTokens[i].value === '-' && 
                                           i + 1 < sideTokens.length && 
                                           sideTokens[i + 1].type === 'parenthesis' && 
                                           sideTokens[i + 1].value === '(');
                    
                    const isCoeffParen = (sideTokens[i].type === 'number' && 
                                        i + 1 < sideTokens.length && 
                                        sideTokens[i + 1].type === 'parenthesis' && 
                                        sideTokens[i + 1].value === '(');
                    
                    if (isCoeffParen) {
                        const coeff = sideTokens[i].value;
                        let j = i + 2;
                        let depth = 1;
                        
                        while (j < sideTokens.length && depth > 0) {
                            if (sideTokens[j].value === '(') depth++;
                            if (sideTokens[j].value === ')') depth--;
                            j++;
                        }
                        
                        const innerTokens = sideTokens.slice(i + 2, j - 1);
                        
                        let needOp = false;
                        for (let k = 0; k < innerTokens.length; k++) {
                            const inner = innerTokens[k];
                            
                            if (inner.type === 'number') {
                                if (needOp) {
                                    result.push({ type: 'operator', value: '+' });
                                }
                                result.push({ type: 'number', value: inner.value * coeff });
                                needOp = true;
                            } else if (inner.type === 'variable') {
                                if (needOp) {
                                    result.push({ type: 'operator', value: '+' });
                                }
                                result.push({ type: 'number', value: coeff });
                                result.push({ type: 'operator', value: '×' });
                                result.push({ type: 'variable', value: inner.value });
                                needOp = true;
                            } else if (inner.type === 'operator') {
                                if (inner.value === '-') {
                                    result.push({ type: 'operator', value: '-' });
                                    needOp = false;
                                } else if (inner.value === '+') {
                                    result.push({ type: 'operator', value: '+' });
                                    needOp = false;
                                }
                            }
                        }
                        
                        expanded = true;
                        i = j;
                    } else if (isNegativeParen) {
                        let j = i + 2;
                        let depth = 1;
                        
                        while (j < sideTokens.length && depth > 0) {
                            if (sideTokens[j].value === '(') depth++;
                            if (sideTokens[j].value === ')') depth--;
                            j++;
                        }
                        
                        const innerTokens = sideTokens.slice(i + 2, j - 1);
                        
                        let needOp = false;
                        for (let k = 0; k < innerTokens.length; k++) {
                            const inner = innerTokens[k];
                            
                            if (inner.type === 'number') {
                                if (needOp) {
                                    result.push({ type: 'operator', value: '-' });
                                }
                                result.push({ type: 'number', value: -inner.value });
                                needOp = true;
                            } else if (inner.type === 'variable') {
                                if (needOp) {
                                    result.push({ type: 'operator', value: '-' });
                                }
                                result.push({ type: 'number', value: -1 });
                                result.push({ type: 'operator', value: '×' });
                                result.push({ type: 'variable', value: inner.value });
                                needOp = true;
                            } else if (inner.type === 'operator') {
                                if (inner.value === '+') {
                                    if (k + 1 < innerTokens.length) {
                                        result.push({ type: 'operator', value: '-' });
                                        needOp = false;
                                    }
                                } else if (inner.value === '-') {
                                    if (k + 1 < innerTokens.length) {
                                        result.push({ type: 'operator', value: '+' });
                                        needOp = false;
                                    }
                                }
                            }
                        }
                        
                        expanded = true;
                        i = j;
                    } else {
                        result.push(sideTokens[i]);
                        i++;
                    }
                }
                
                return { tokens: result, expanded };
            }

            let maxExpandIterations = 5;
            while (maxExpandIterations-- > 0) {
                const beforeExpandLeft = formatExpression(leftTokens);
                const beforeExpandRight = formatExpression(rightTokens);
                const beforeExpandStr = beforeExpandLeft + ' = ' + beforeExpandRight;
                
                const leftExpand = expandParentheses(leftTokens);
                const rightExpand = expandParentheses(rightTokens);
                
                if (leftExpand.expanded || rightExpand.expanded) {
                    leftTokens = leftExpand.tokens;
                    rightTokens = rightExpand.tokens;
                    
                    steps.push({
                        title: t.stepExpand,
                        before: beforeExpandStr,
                        after: formatExpression(leftTokens) + ' = ' + formatExpression(rightTokens)
                    });
                } else {
                    break;
                }
            }

            function simplifyNumericOperations(tokens) {
                let result = [...tokens];
                let changed = false;
                
                for (let i = 0; i < result.length; i++) {
                    if ((result[i].value === '×' || result[i].value === '÷') &&
                        result[i - 1] && result[i - 1].type === 'number' &&
                        result[i + 1] && result[i + 1].type === 'number') {
                        
                        let calcResult;
                        if (result[i].value === '×') {
                            calcResult = result[i - 1].value * result[i + 1].value;
                        } else {
                            calcResult = result[i - 1].value / result[i + 1].value;
                        }
                        
                        result = [
                            ...result.slice(0, i - 1),
                            { type: 'number', value: calcResult },
                            ...result.slice(i + 2)
                        ];
                        changed = true;
                        i--;
                    }
                }
                
                return { tokens: result, changed };
            }

            let maxCalcIterations = 10;
            while (maxCalcIterations-- > 0) {
                const beforeCalcLeft = formatExpression(leftTokens);
                const beforeCalcRight = formatExpression(rightTokens);
                const beforeCalcStr = beforeCalcLeft + ' = ' + beforeCalcRight;
                
                const leftSimplify = simplifyNumericOperations(leftTokens);
                const rightSimplify = simplifyNumericOperations(rightTokens);
                
                if (leftSimplify.changed || rightSimplify.changed) {
                    leftTokens = leftSimplify.tokens;
                    rightTokens = rightSimplify.tokens;
                    
                    steps.push({
                        title: t.stepMultiplyDivide,
                        before: beforeCalcStr,
                        after: formatExpression(leftTokens) + ' = ' + formatExpression(rightTokens)
                    });
                } else {
                    break;
                }
            }

            function analyzeTerms(tokens) {
                const terms = [];
                let currentTerm = { coeff: 0, hasVar: false, varName: '', sign: 1 };
                let i = 0;
                
                if (tokens.length > 0 && tokens[0].value === '-') {
                    currentTerm.sign = -1;
                    i = 1;
                } else if (tokens.length > 0 && tokens[0].value === '+') {
                    i = 1;
                }
                
                while (i < tokens.length) {
                    const token = tokens[i];
                    
                    if (token.type === 'number') {
                        currentTerm.coeff = token.value * currentTerm.sign;
                        
                        if (i + 1 < tokens.length && tokens[i + 1].type === 'variable') {
                            currentTerm.hasVar = true;
                            currentTerm.varName = tokens[i + 1].value;
                            terms.push({ ...currentTerm });
                            currentTerm = { coeff: 0, hasVar: false, varName: '', sign: 1 };
                            i += 2;
                        } else if (i + 2 < tokens.length && tokens[i + 1].value === '×' && tokens[i + 2].type === 'variable') {
                            currentTerm.hasVar = true;
                            currentTerm.varName = tokens[i + 2].value;
                            terms.push({ ...currentTerm });
                            currentTerm = { coeff: 0, hasVar: false, varName: '', sign: 1 };
                            i += 3;
                        } else {
                            terms.push({ ...currentTerm });
                            currentTerm = { coeff: 0, hasVar: false, varName: '', sign: 1 };
                            i++;
                        }
                    } else if (token.type === 'variable') {
                        currentTerm.hasVar = true;
                        currentTerm.varName = token.value;
                        
                        if (i + 2 < tokens.length && tokens[i + 1].value === '×' && tokens[i + 2].type === 'number') {
                            currentTerm.coeff = tokens[i + 2].value * currentTerm.sign;
                            terms.push({ ...currentTerm });
                            currentTerm = { coeff: 0, hasVar: false, varName: '', sign: 1 };
                            i += 3;
                        } else {
                            currentTerm.coeff = currentTerm.sign;
                            terms.push({ ...currentTerm });
                            currentTerm = { coeff: 0, hasVar: false, varName: '', sign: 1 };
                            i++;
                        }
                    } else if (token.type === 'operator') {
                        if (token.value === '+') {
                            currentTerm.sign = 1;
                        } else if (token.value === '-') {
                            currentTerm.sign = -1;
                        }
                        i++;
                    } else {
                        i++;
                    }
                }
                
                return terms;
            }

            const leftTerms = analyzeTerms(leftTokens);
            const rightTerms = analyzeTerms(rightTokens);

            let leftVarTerms = leftTerms.filter(t => t.hasVar);
            let leftConstTerms = leftTerms.filter(t => !t.hasVar);
            let rightVarTerms = rightTerms.filter(t => t.hasVar);
            let rightConstTerms = rightTerms.filter(t => !t.hasVar);

            const needMove = rightVarTerms.length > 0 || leftConstTerms.length > 0;
            
            function buildExpression(varTerms, constTerms, varName) {
                let expr = '';
                let first = true;
                
                varTerms.forEach(term => {
                    if (term.coeff !== 0) {
                        if (!first && term.coeff > 0) {
                            expr += '+';
                        }
                        if (term.coeff === 1) {
                            expr += varName;
                        } else if (term.coeff === -1) {
                            expr += '-' + varName;
                        } else {
                            expr += term.coeff + '×' + varName;
                        }
                        first = false;
                    }
                });
                
                constTerms.forEach(term => {
                    if (term.coeff !== 0) {
                        if (!first && term.coeff > 0) {
                            expr += '+';
                        }
                        expr += term.coeff;
                        first = false;
                    }
                });
                
                return expr || '0';
            }

            if (needMove) {
                const newLeftVarTerms = [...leftVarTerms];
                const newRightConstTerms = [...rightConstTerms];
                
                rightVarTerms.forEach(term => {
                    newLeftVarTerms.push({
                        coeff: -term.coeff,
                        hasVar: true,
                        varName: term.varName
                    });
                });
                
                leftConstTerms.forEach(term => {
                    newRightConstTerms.push({
                        coeff: -term.coeff,
                        hasVar: false
                    });
                });

                const beforeMoveStr = formatExpression(leftTokens) + ' = ' + formatExpression(rightTokens);
                
                const movedLeftExpr = buildExpression(newLeftVarTerms, [], varName);
                const movedRightExpr = buildExpression([], newRightConstTerms, varName);

                steps.push({
                    title: t.stepMove,
                    before: beforeMoveStr,
                    after: movedLeftExpr + ' = ' + movedRightExpr
                });

                leftVarTerms = newLeftVarTerms;
                rightConstTerms = newRightConstTerms;
            }

            const beforeMergeLeft = buildExpression(leftVarTerms, [], varName);
            const beforeMergeRight = buildExpression([], rightConstTerms, varName);
            const beforeMergeStr = beforeMergeLeft + ' = ' + beforeMergeRight;
            
            let varCoeff = 0;
            let constTerm = 0;

            leftVarTerms.forEach(term => {
                varCoeff += term.coeff;
            });

            rightConstTerms.forEach(term => {
                constTerm += term.coeff;
            });

            let mergedLeft = '';
            let mergedRight = '';

            if (varCoeff === 1) {
                mergedLeft = varName;
            } else if (varCoeff === -1) {
                mergedLeft = '-' + varName;
            } else {
                mergedLeft = varCoeff + '×' + varName;
            }

            mergedRight = constTerm.toString();

            steps.push({
                title: t.stepMerge,
                before: beforeMergeStr,
                after: mergedLeft + ' = ' + mergedRight
            });

            if (varCoeff === 0) {
                return {
                    steps,
                    result: null,
                    error: t.errorInvalid
                };
            }

            const beforeCoeffStr = mergedLeft + ' = ' + mergedRight;
            const solution = constTerm / varCoeff;
            const roundedSolution = Math.round(solution * 10000) / 10000;

            steps.push({
                title: t.stepCoeff,
                before: beforeCoeffStr,
                after: varName + ' = ' + roundedSolution
            });

            return {
                steps: steps.map(s => ({ ...s, isEquation: true })),
                result: roundedSolution
            };
        }

        function solve(input) {
            const parsedInput = parseInput(input);
            const tokens = tokenize(parsedInput);
            const t = translations[currentLang];
            
            // 检查tokenize是否返回错误
            if (tokens.error) {
                return { steps: [], result: null, error: tokens.error };
            }
            
            if (tokens.length === 0) {
                return { steps: [], result: null, error: t.errorInvalid };
            }
            
            if (isEquation(tokens) && hasVariable(tokens)) {
                const result = solveLinearEquation(tokens, currentLang);
                // 检查是否返回错误
                if (result && result.error) {
                    return { steps: [], result: null, error: result.message };
                }
                return result;
            } else {
                return solveArithmetic(tokens, currentLang);
            }
        }

        function highlightByPosition(expr, start, end, highlightClass) {
            if (start === undefined || end === undefined || start < 0 || end > expr.length) {
                return expr;
            }
            return expr.substring(0, start) + 
                   `<span class="${highlightClass}">` + 
                   expr.substring(start, end) + 
                   `</span>` + 
                   expr.substring(end);
        }
        
        function renderStep(step, index, isSubStep = false) {
            let content = '';
            const useFraction = step.isEquation;
            const t = translations[currentLang];
            
            if (isSubStep) {
                content += `<div class="sub-step">`;
                content += `<div class="sub-step-title">${step.title}</div>`;
            } else {
                content += `<div class="step-card" style="animation-delay: ${index * 0.1}s;">`;
                content += `<div class="step-header">`;
                content += `<span class="step-number">${index + 1}</span>`;
                content += `<div class="step-title">${step.title}</div>`;
                
                let hint = '';
                if (step.title === t.stepDenominator) {
                    hint = t.hintDenominator;
                } else if (step.title === t.stepExpand) {
                    hint = t.hintExpand;
                } else if (step.title === t.stepMove) {
                    hint = t.hintMove;
                } else if (step.title === t.stepMerge) {
                    hint = t.hintMerge;
                } else if (step.title === t.stepCoeff) {
                    hint = t.hintCoeff;
                }
                
                if (hint) {
                    content += `<span class="step-hint">(${hint})</span>`;
                }
                
                content += `</div>`;
            }
            
            if (step.pairs && step.pairs.length > 0) {
                step.pairs.forEach((pair, pairIndex) => {
                    if (pair.before) {
                        let beforeHtml = pair.before;
                        if (pair.calcStart !== undefined && pair.calcEnd !== undefined) {
                            beforeHtml = highlightByPosition(beforeHtml, pair.calcStart, pair.calcEnd, 'highlight-calc');
                        }
                        if (useFraction) {
                            beforeHtml = convertToFractionString(beforeHtml);
                        }
                        if (isSubStep) {
                            content += `<span class="step-expression" style="font-size: 1.1rem; padding: 8px 12px;">${beforeHtml}</span>`;
                        } else {
                            content += `<div class="step-expression">${beforeHtml}</div>`;
                        }
                    }
                    if (pair.after) {
                        content += `<span class="step-arrow">→</span>`;
                        let afterHtml = pair.after;
                        if (pair.resultStart !== undefined && pair.resultEnd !== undefined) {
                            afterHtml = highlightByPosition(afterHtml, pair.resultStart, pair.resultEnd, 'highlight-result');
                        }
                        if (useFraction) {
                            afterHtml = convertToFractionString(afterHtml);
                        }
                        if (isSubStep) {
                            content += `<span class="step-expression" style="font-size: 1.1rem; padding: 8px 12px;">${afterHtml}</span>`;
                        } else {
                            content += `<span class="step-expression">${afterHtml}</span>`;
                        }
                    }
                    if (pairIndex < step.pairs.length - 1) {
                        content += `<div style="height: 8px;"></div>`;
                    }
                });
            } else {
                if (step.before) {
                    let beforeHtml = step.before;
                    if (step.calcStart !== undefined && step.calcEnd !== undefined) {
                        beforeHtml = highlightByPosition(beforeHtml, step.calcStart, step.calcEnd, 'highlight-calc');
                    }
                    if (useFraction) {
                        beforeHtml = convertToFractionString(beforeHtml);
                    }
                    if (isSubStep) {
                        content += `<span class="step-expression" style="font-size: 1.1rem; padding: 8px 12px;">${beforeHtml}</span>`;
                    } else {
                        content += `<div class="step-expression">${beforeHtml}</div>`;
                    }
                }
                if (step.after) {
                    content += `<span class="step-arrow">→</span>`;
                    let afterHtml = step.after;
                    if (step.resultStart !== undefined && step.resultEnd !== undefined) {
                        afterHtml = highlightByPosition(afterHtml, step.resultStart, step.resultEnd, 'highlight-result');
                    }
                    if (useFraction) {
                        afterHtml = convertToFractionString(afterHtml);
                    }
                    if (isSubStep) {
                        content += `<span class="step-expression" style="font-size: 1.1rem; padding: 8px 12px;">${afterHtml}</span>`;
                    } else {
                        content += `<span class="step-expression">${afterHtml}</span>`;
                    }
                }
            }
            
            if (step.subSteps && step.subSteps.length > 0) {
                step.subSteps.forEach(subStep => {
                    content += renderStep({...subStep, isEquation: useFraction}, 0, true);
                });
            }
            
            if (isSubStep) {
                content += `</div>`;
            } else {
                content += `</div>`;
            }
            
            return content;
        }
        
        function displaySteps(result) {
            const container = document.getElementById('steps-container');
            const stepsCount = document.getElementById('steps-count');
            const t = translations[currentLang];
            
            container.innerHTML = '';
            
            if (result.error) {
                container.innerHTML = `<div class="no-steps">${result.error}</div>`;
                stepsCount.style.display = 'none';
                return;
            }
            
            if (result.steps.length === 0) {
                container.innerHTML = `<div class="no-steps">${t.noSteps}</div>`;
                stepsCount.style.display = 'none';
                return;
            }
            
            stepsCount.style.display = 'inline-block';
            stepsCount.textContent = `${result.steps.length} ${t.stepsCount}`;
            
            let htmlContent = '';
            result.steps.forEach((step, index) => {
                htmlContent += renderStep(step, index, false);
            });
            container.innerHTML = htmlContent;
            
            if (result.result !== null && result.result !== undefined) {
                const answerDiv = document.createElement('div');
                answerDiv.className = 'final-answer';
                answerDiv.innerHTML = `${t.finalAnswer}: ${Math.round(result.result * 10000) / 10000}`;
                container.appendChild(answerDiv);
            }
        }

        function init() {
            const params = getUrlParams();
            
            elements.themeLight = document.getElementById('theme-light');
            elements.themeDark = document.getElementById('theme-dark');
            elements.themeEye = document.getElementById('theme-eye');
            elements.langToggle = document.getElementById('lang-toggle');
            
            const savedTheme = localStorage.getItem('math-practice-theme') || 'light';
            let savedLang = localStorage.getItem('math-practice-lang');
            
            if (!savedLang) {
                // 根据系统语言设置默认语言
                const systemLang = navigator.language || navigator.userLanguage;
                if (systemLang.startsWith('zh')) {
                    savedLang = 'zh';
                } else {
                    savedLang = 'en';
                }
            }
            
            setTheme(savedTheme);
            currentLang = savedLang;
            elements.langToggle.textContent = currentLang === 'zh' ? 'EN' : '中';
            applyTranslations(savedLang);
            
            elements.themeLight.addEventListener('click', () => setTheme('light'));
            elements.themeDark.addEventListener('click', () => setTheme('dark'));
            elements.themeEye.addEventListener('click', () => setTheme('eye'));
            elements.langToggle.addEventListener('click', toggleLanguage);
            
            // 添加操作提示切换功能
            const toggleExamples = document.getElementById('toggle-examples');
            const examplesSection = document.getElementById('examples-section');
            
            if (toggleExamples && examplesSection) {
                toggleExamples.addEventListener('click', () => {
                    if (examplesSection.style.display === 'none') {
                        examplesSection.style.display = 'block';
                        toggleExamples.textContent = '隐藏操作提示';
                    } else {
                        examplesSection.style.display = 'none';
                        toggleExamples.textContent = '操作提示';
                    }
                });
            }
            
            if (params.math) {
                const parsedMath = parseInput(params.math);
                document.getElementById('math-input').value = parsedMath;
                currentInput = params.math;
                const result = solve(params.math);
                displaySteps(result);
            }
            
            document.getElementById('solve-btn').addEventListener('click', () => {
                const input = document.getElementById('math-input').value;
                if (input.trim()) {
                    currentInput = input;
                    const result = solve(input);
                    displaySteps(result);
                }
            });
            
            document.getElementById('math-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const input = document.getElementById('math-input').value;
                    if (input.trim()) {
                        currentInput = input;
                        const result = solve(input);
                        displaySteps(result);
                    }
                }
            });
            
            document.querySelectorAll('.example-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const math = btn.dataset.math;
                    document.getElementById('math-input').value = math;
                    currentInput = math;
                    const result = solve(math);
                    displaySteps(result);
                });
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
