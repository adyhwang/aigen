        // 生成带括号的表达式
        function generateExpressionWithBrackets(numbers, ops) {
            // 确保有足够的数字来添加有意义的括号
            if (numbers.length < 3) {
                // 数字太少，无法形成有意义的括号表达式
                let expr = '';
                for (let i = 0; i < numbers.length; i++) {
                    expr += numbers[i];
                    if (i < ops.length) {
                        expr += ops[i];
                    }
                }
                return expr;
            }
            
            // 智能括号放置策略：只在有意义的位置添加括号
            // 括号有意义的情况：
            // 1. 括号内包含低优先级运算符（+-），括号外有高优先级运算符（×÷）
            // 2. 括号改变运算顺序
            
            const validBracketPositions = [];
            
            // 寻找所有有效的括号位置
            for (let start = 0; start < numbers.length - 1; start++) {
                for (let end = start + 1; end < numbers.length; end++) {
                    // 括号内至少要有两个数字
                    if (end - start < 1) continue;
                    
                    // 检查括号内的运算符
                    const innerOps = [];
                    for (let i = start; i < end; i++) {
                        if (ops[i]) innerOps.push(ops[i]);
                    }
                    
                    // 检查括号外的运算符（左边）
                    const leftOp = start > 0 ? ops[start - 1] : null;
                    // 检查括号外的运算符（右边）
                    const rightOp = end < ops.length ? ops[end] : null;
                    
                    // 括号有意义的条件：
                    // 1. 括号内有低优先级运算符，且外面有高优先级运算符
                    // 2. 括号前面是减号或除号（改变运算顺序很重要）
                    let isMeaningful = false;
                    
                    // 情况1：括号内有+-，括号外有×÷
                    const hasLowPriorityInside = innerOps.some(op => op === '+' || op === '-');
                    const hasHighPriorityOutside = (leftOp === '×' || leftOp === '÷' || rightOp === '×' || rightOp === '÷');
                    
                    if (hasLowPriorityInside && hasHighPriorityOutside) {
                        isMeaningful = true;
                    }
                    
                    // 情况2：括号前是减号（如 a - (b + c)）
                    if (leftOp === '-' && innerOps.length > 0) {
                        isMeaningful = true;
                    }
                    
                    // 情况3：括号前是除号（如 a ÷ (b × c)）
                    if (leftOp === '÷' && innerOps.length > 0) {
                        isMeaningful = true;
                    }
                    
                    // 避免无意义的括号：
                    // 1. 整个表达式都被括号包围
                    if (start === 0 && end === numbers.length - 1) {
                        isMeaningful = false;
                    }
                    
                    // 2. 括号内只有单个数字（如 (3)+5）
                    if (innerOps.length === 0) {
                        isMeaningful = false;
                    }
                    
                    // 3. 括号内全是高优先级运算，外面全是低优先级（括号无意义）
                    const allHighPriorityInside = innerOps.length > 0 && innerOps.every(op => op === '×' || op === '÷');
                    const allLowPriorityOutside = (leftOp === null || leftOp === '+' || leftOp === '-') && 
                                                   (rightOp === null || rightOp === '+' || rightOp === '-');
                    if (allHighPriorityInside && allLowPriorityOutside) {
                        isMeaningful = false;
                    }
                    
                    if (isMeaningful) {
                        validBracketPositions.push({ start, end });
                    }
                }
            }
            
            // 如果没有找到有效的括号位置，返回无括号表达式
            if (validBracketPositions.length === 0) {
                let expr = '';
                for (let i = 0; i < numbers.length; i++) {
                    expr += numbers[i];
                    if (i < ops.length) {
                        expr += ops[i];
                    }
                }
                return expr;
            }
            
            // 随机选择一个有效的括号位置
            const selectedPos = validBracketPositions[Math.floor(Math.random() * validBracketPositions.length)];
            const { start, end } = selectedPos;
            
            // 构建带括号的表达式
            let expr = '';
            for (let i = 0; i < numbers.length; i++) {
                // 在起始位置添加左括号
                if (i === start) {
                    expr += '(';
                }
                
                expr += numbers[i];
                
                // 在结束位置添加右括号
                if (i === end) {
                    expr += ')';
                }
                
                // 添加运算符（如果不是最后一个数字）
                if (i < ops.length) {
                    expr += ops[i];
                }
            }
            
            return expr;
        }

        // ------------ 表达式解析和计算系统 ------------

        // 运算符优先级
        const OPERATOR_PRECEDENCE = {
            '+': 1,
            '-': 1,
            '×': 2,
            '÷': 2
        };

        // 将中缀表达式转换为后缀表达式(逆波兰表示法)
        function infixToPostfix(expression) {
            const outputQueue = [];
            const operatorStack = [];
            let currentNumber = '';
            let isDecimal = false;
            
            // 处理表达式中的每个字符
            for (let i = 0; i < expression.length; i++) {
                const char = expression[i];
                
                // 如果是数字或小数点，构建当前数字
                if (!isNaN(parseFloat(char)) || (char === '.' && !isDecimal)) {
                    currentNumber += char;
                    if (char === '.') isDecimal = true;
                } else {
                    // 如果正在构建数字，将其添加到输出队列
                    if (currentNumber !== '') {
                        outputQueue.push(parseFloat(currentNumber));
                        currentNumber = '';
                        isDecimal = false;
                    }
                    
                    // 处理运算符和括号
                    if (char === '(') {
                        operatorStack.push(char);
                    } else if (char === ')') {
                        // 弹出直到遇到左括号
                        while (operatorStack.length > 0 && operatorStack[operatorStack.length - 1] !== '(') {
                            outputQueue.push(operatorStack.pop());
                        }
                        operatorStack.pop(); // 弹出左括号，不添加到输出队列
                    } else if (OPERATOR_PRECEDENCE[char] !== undefined) {
                        // 处理运算符，按照优先级弹出
                        while (operatorStack.length > 0 && 
                               operatorStack[operatorStack.length - 1] !== '(' && 
                               OPERATOR_PRECEDENCE[operatorStack[operatorStack.length - 1]] >= OPERATOR_PRECEDENCE[char]) {
                            outputQueue.push(operatorStack.pop());
                        }
                        operatorStack.push(char);
                    }
                }
            }
            
            // 添加最后一个数字
            if (currentNumber !== '') {
                outputQueue.push(parseFloat(currentNumber));
            }
            
            // 弹出所有剩余的运算符
            while (operatorStack.length > 0) {
                outputQueue.push(operatorStack.pop());
            }
            
            return outputQueue;
        }

        // 计算后缀表达式
        function calculatePostfix(postfix) {
            const stack = [];
            
            for (const token of postfix) {
                // 如果是数字，压入栈
                if (typeof token === 'number') {
                    stack.push(token);
                } else {
                    // 如果是运算符，弹出两个数字进行计算
                    if (stack.length < 2) {
                        return null;
                    }
                    
                    const b = stack.pop();
                    const a = stack.pop();
                    let result;
                    
                    switch (token) {
                        case '+':
                            result = a + b;
                            break;
                        case '-':
                            result = a - b;
                            break;
                        case '×':
                            result = a * b;
                            break;
                        case '÷':
                            if (b === 0) {
                                return null;
                            }
                            // 检查除法是否会产生有限小数
                            // 转换为分数形式检查
                            const numerator = a;
                            const denominator = b;
                            
                            // 简化分数
                            const commonDivisor = gcd(numerator, denominator);
                            const simplifiedDenominator = denominator / commonDivisor;
                            
                            // 检查简化后的分母是否只包含2和5的因数（有限小数条件）
                            let temp = simplifiedDenominator;
                            while (temp % 2 === 0) temp /= 2;
                            while (temp % 5 === 0) temp /= 5;
                            
                            if (temp !== 1) {
                                return null;
                            }
                            
                            result = a / b;
                            break;
                        default:
                            return null;
                    }
                    
                    stack.push(result);
                }
            }
            
            // 栈中应该只剩下一个结果
            if (stack.length !== 1) {
                return null;
            }
            
            return stack[0];
        }

        // 计算表达式的主函数
        function calculateExpression(expression) {
            try {
                // 转换为后缀表达式
                const postfix = infixToPostfix(expression);
                if (!postfix || postfix.length === 0) {
                    return null;
                }
                
                // 计算后缀表达式
                let result = calculatePostfix(postfix);
                if (result === null) {
                    return null;
                }
                
                // 检查结果是否为有限小数
                if (!isFiniteDecimal(result)) {
                    return null;
                }
                
                // 处理浮点数精度问题
                if (Math.abs(result) > CONFIG.FLOAT_PRECISION && Math.abs(result - Math.round(result)) < CONFIG.FLOAT_PRECISION) {
                    result = Math.round(result);
                } else {
                    // 保留小数位，避免过多小数位
                    result = Number(result.toFixed(CONFIG.MAX_DECIMAL_PLACES));
                }
                
                return result;
            } catch (e) {
                return null;
            }
        }

        // 生成表达式字符串和答案位置信息
        function generateExpressionWithAnswerPosition(numNumbers, operators, maxDigitLength, numberTypes, useBrackets, answerPosition) {
            // 对于左侧答案位置 - 答案在等于号左边的任意位置
            if (answerPosition === 'left') {
                // 确保至少有2个数字
                if (numNumbers < 2) numNumbers = 2;
                
                // 随机选择答案位置（0 到 numNumbers-1）
                const answerIndex = Math.floor(Math.random() * numNumbers);
                
                // 生成所有数字（包括答案位置，先放一个占位符）
                const numbers = [];
                for (let i = 0; i < numNumbers; i++) {
                    if (i === answerIndex) {
                        numbers.push(null); // 答案位置用 null 占位
                    } else {
                        const isDecimal = numberTypes.includes('decimal') && 
                                         (numberTypes.length === 1 || Math.random() < CONFIG.DECIMAL_PROBABILITY);
                        numbers.push(generateRandomNumber(maxDigitLength, isDecimal));
                    }
                }
                
                // 生成运算符
                const ops = [];
                for (let i = 0; i < numNumbers - 1; i++) {
                    const opIndex = Math.floor(Math.random() * operators.length);
                    let op = operators[opIndex];
                    
                    // 特殊处理除法避免除零和无限小数
                    if (op === '÷' && numbers[i + 1] !== null) {
                        // 获取左右操作数（如果左边是null，暂时用一个随机数检查）
                        let a = numbers[i] !== null ? numbers[i] : generateRandomNumber(maxDigitLength, false);
                        let b = numbers[i + 1];
                        
                        // 确保除数不为0
                        if (b === 0) {
                            op = '×';
                        } else {
                            // 检查是否会产生无限小数
                            const g = gcd(a, b);
                            let den = b / g;
                            while (den % 2 === 0) den /= 2;
                            while (den % 5 === 0) den /= 5;
                            if (den !== 1) {
                                op = '×';
                            }
                        }
                    }
                    
                    ops.push(op);
                }
                
                // 生成等号右边的结果
                const isFinalResultDecimal = numberTypes.includes('decimal') && 
                                           (numberTypes.length === 1 || Math.random() < CONFIG.DECIMAL_PROBABILITY);
                const finalResult = generateRandomNumber(maxDigitLength, isFinalResultDecimal);
                
                // 根据答案位置计算答案值
                let answerValue;
                
                if (answerIndex === 0) {
                    // 答案在最左边：? op num1 op num2 ... = finalResult
                    // 先计算右边部分的结果
                    let rightExpr = '';
                    for (let i = 1; i < numNumbers; i++) {
                        rightExpr += numbers[i];
                        if (i - 1 < ops.length) {
                            rightExpr += ops[i - 1];
                        }
                    }
                    const rightResult = calculateExpression(rightExpr);
                    if (rightResult === null) return null;
                    
                    // 根据第一个运算符计算答案
                    const firstOp = ops[0];
                    switch (firstOp) {
                        case '+': answerValue = finalResult - rightResult; break;
                        case '-': answerValue = finalResult + rightResult; break;
                        case '×': 
                            if (rightResult === 0) return null;
                            answerValue = finalResult / rightResult; 
                            break;
                        case '÷': answerValue = finalResult * rightResult; break;
                        default: answerValue = finalResult - rightResult;
                    }
                } else if (answerIndex === numNumbers - 1) {
                    // 答案在最右边（等于号左边）：num0 op num1 op ... op ? = finalResult
                    // 先计算左边部分的结果
                    let leftExpr = '';
                    for (let i = 0; i < numNumbers - 1; i++) {
                        leftExpr += numbers[i];
                        if (i < ops.length - 1) {
                            leftExpr += ops[i];
                        }
                    }
                    const leftResult = calculateExpression(leftExpr);
                    if (leftResult === null) return null;
                    
                    // 根据最后一个运算符计算答案
                    const lastOp = ops[ops.length - 1];
                    switch (lastOp) {
                        case '+': answerValue = finalResult - leftResult; break;
                        case '-': answerValue = leftResult - finalResult; break;
                        case '×': 
                            if (leftResult === 0) return null;
                            answerValue = finalResult / leftResult; 
                            break;
                        case '÷': answerValue = leftResult / finalResult; break;
                        default: answerValue = finalResult - leftResult;
                    }
                } else {
                    // 答案在中间位置：使用更简单可靠的策略
                    // 策略：先构建完整的表达式（用随机数作为答案），然后计算结果，
                    // 再反推答案应该是什么
                    
                    // 临时用一个随机数作为答案
                    const tempAnswer = generateRandomNumber(maxDigitLength, false);
                    numbers[answerIndex] = tempAnswer;
                    
                    // 构建完整表达式
                    let tempExpression = '';
                    for (let i = 0; i < numNumbers; i++) {
                        tempExpression += numbers[i];
                        if (i < ops.length) {
                            tempExpression += ops[i];
                        }
                    }
                    
                    // 计算这个表达式的结果
                    const tempResult = calculateExpression(tempExpression);
                    if (tempResult === null) return null;
                    
                    // 现在我们知道：tempAnswer 在 answerIndex 位置时，结果是 tempResult
                    // 我们需要找到一个 answerValue，使得结果是 finalResult
                    
                    // 根据答案位置的运算符情况，使用不同的计算方法
                    const leftOp = ops[answerIndex - 1];
                    const rightOp = ops[answerIndex];
                    
                    // 计算左边部分（不含答案）
                    let leftExpr = '';
                    for (let i = 0; i < answerIndex; i++) {
                        leftExpr += numbers[i];
                        if (i < answerIndex - 1) {
                            leftExpr += ops[i];
                        }
                    }
                    const leftResult = leftExpr ? calculateExpression(leftExpr) : 0;
                    if (leftResult === null) return null;
                    
                    // 计算右边部分（不含答案）
                    let rightExpr = '';
                    for (let i = answerIndex + 1; i < numNumbers; i++) {
                        rightExpr += numbers[i];
                        if (i < ops.length) {
                            rightExpr += ops[i];
                        }
                    }
                    const rightResult = rightExpr ? calculateExpression(rightExpr) : 0;
                    if (rightResult === null) return null;
                    
                    // 根据运算符优先级计算答案
                    // 情况1：左边是 ×÷，右边是 ×÷（高优先级）
                    // 情况2：左边是 ×÷，右边是 +-（混合）
                    // 情况3：左边是 +-，右边是 ×÷（混合）
                    // 情况4：左边是 +-，右边是 +-（低优先级）
                    
                    const leftPriority = (leftOp === '×' || leftOp === '÷') ? 2 : 1;
                    const rightPriority = (rightOp === '×' || rightOp === '÷') ? 2 : 1;
                    
                    if (leftPriority === 2 && rightPriority === 2) {
                        // 两边都是高优先级：leftResult leftOp answerValue rightOp rightResult = finalResult
                        // 简化处理：假设从左到右计算
                        if (leftOp === '×' && rightOp === '×') {
                            answerValue = finalResult / (leftResult * rightResult);
                        } else if (leftOp === '×' && rightOp === '÷') {
                            answerValue = (finalResult * rightResult) / leftResult;
                        } else if (leftOp === '÷' && rightOp === '×') {
                            answerValue = (leftResult * rightResult) / finalResult;
                        } else if (leftOp === '÷' && rightOp === '÷') {
                            answerValue = leftResult / (finalResult * rightResult);
                        } else {
                            // 复杂情况，尝试另一种方法
                            return null;
                        }
                    } else if (leftPriority === 2 && rightPriority === 1) {
                        // 左边高，右边低：(leftResult leftOp answerValue) rightOp rightResult = finalResult
                        let partialResult;
                        switch (rightOp) {
                            case '+': partialResult = finalResult - rightResult; break;
                            case '-': partialResult = finalResult + rightResult; break;
                            default: return null;
                        }
                        // leftResult leftOp answerValue = partialResult
                        switch (leftOp) {
                            case '×': answerValue = partialResult / leftResult; break;
                            case '÷': answerValue = leftResult / partialResult; break;
                            default: return null;
                        }
                    } else if (leftPriority === 1 && rightPriority === 2) {
                        // 左边低，右边高：leftResult leftOp (answerValue rightOp rightResult) = finalResult
                        let partialResult;
                        switch (leftOp) {
                            case '+': partialResult = finalResult - leftResult; break;
                            case '-': partialResult = leftResult - finalResult; break;
                            default: return null;
                        }
                        // answerValue rightOp rightResult = partialResult
                        switch (rightOp) {
                            case '×': answerValue = partialResult / rightResult; break;
                            case '÷': answerValue = partialResult * rightResult; break;
                            default: return null;
                        }
                    } else {
                        // 两边都是低优先级，从左到右计算
                        // leftResult leftOp answerValue rightOp rightResult = finalResult
                        if (leftOp === '+' && rightOp === '+') {
                            answerValue = finalResult - leftResult - rightResult;
                        } else if (leftOp === '+' && rightOp === '-') {
                            answerValue = finalResult - leftResult + rightResult;
                        } else if (leftOp === '-' && rightOp === '+') {
                            answerValue = leftResult - finalResult + rightResult;
                        } else if (leftOp === '-' && rightOp === '-') {
                            answerValue = leftResult - finalResult - rightResult;
                        } else {
                            return null;
                        }
                    }
                }
                
                // 确保答案是有效数字且是有限小数
                if (isNaN(answerValue) || !isFinite(answerValue) || !isFiniteDecimal(answerValue)) {
                    return null;
                }
                
                // 格式化答案
                answerValue = Number(answerValue.toFixed(CONFIG.MAX_DECIMAL_PLACES));
                
                // 构建完整表达式用于验证
                numbers[answerIndex] = answerValue;
                let fullExpression = '';
                for (let i = 0; i < numNumbers; i++) {
                    fullExpression += numbers[i];
                    if (i < ops.length) {
                        fullExpression += ops[i];
                    }
                }
                const fullExpressionResult = calculateExpression(fullExpression);
                
                // 验证完整表达式结果
                if (fullExpressionResult === null || Math.abs(fullExpressionResult - finalResult) > CONFIG.FLOAT_PRECISION) {
                    return null;
                }
                
                // 构建显示表达式（用 ? 代替答案）
                let displayExpression = '';
                for (let i = 0; i < numNumbers; i++) {
                    if (i === answerIndex) {
                        displayExpression += '?';
                    } else {
                        displayExpression += numbers[i];
                    }
                    if (i < ops.length) {
                        displayExpression += ops[i];
                    }
                }
                
                return {
                    originalExpression: fullExpression,
                    displayExpression: displayExpression,
                    result: answerValue,
                    fullResult: finalResult,
                    answerIndex: answerIndex
                };
            } else {
                // 右侧答案位置：正常表达式，结果为答案
                // 生成数字
                const numbers = [];
                for (let i = 0; i < numNumbers; i++) {
                    // 减少小数概率
                    const isDecimal = numberTypes.includes('decimal') && 
                                     (numberTypes.length === 1 || Math.random() < CONFIG.DECIMAL_PROBABILITY);
                    numbers.push(generateRandomNumber(maxDigitLength, isDecimal));
                }
                
                // 生成运算符
                const ops = [];
                for (let i = 0; i < numNumbers - 1; i++) {
                    // 对于减法和除法，确保结果不会为负数或导致除零错误
                    let op;
                    let valid = false;
                    
                    while (!valid) {
                        const opIndex = Math.floor(Math.random() * operators.length);
                        op = operators[opIndex];
                        
                        // 特殊处理减法和除法
                        if (op === '-' || op === '÷') {
                            const num1 = numbers[i];
                            const num2 = numbers[i + 1];
                            
                            // 减法确保结果非负
                            if (op === '-' && num1 < num2) {
                                // 交换数字位置使运算结果有效
                                [numbers[i], numbers[i + 1]] = [numbers[i + 1], numbers[i]];
                            }
                            
                            // 除法特殊处理：确保不会产生无限小数
                            if (op === '÷') {
                                // 确保除数不为0
                                if (num2 === 0) {
                                    valid = false;
                                    continue;
                                }
                                
                                // 确保被除数大于除数
                                if (num1 < num2) {
                                    [numbers[i], numbers[i + 1]] = [numbers[i + 1], numbers[i]];
                                }
                                
                                // 检查是否会产生无限小数
                                const g = gcd(numbers[i], numbers[i + 1]);
                                let den = numbers[i + 1] / g;
                                
                                // 简化分母
                                while (den % 2 === 0) den /= 2;
                                while (den % 5 === 0) den /= 5;
                                
                                // 如果简化后的分母不是1，则会产生无限小数
                                valid = den === 1;
                            } else {
                                valid = true;
                            }
                        } else {
                            valid = true;
                        }
                    }
                    
                    ops.push(op);
                }
                
                // 构建基础表达式或带括号的表达式
                let expressionWithBrackets;
                if (useBrackets && Math.random() > 0.5) {
                    expressionWithBrackets = generateExpressionWithBrackets(numbers, ops);
                } else {
                    // 构建基础表达式
                    expressionWithBrackets = '';
                    for (let i = 0; i < numbers.length; i++) {
                        expressionWithBrackets += numbers[i];
                        if (i < ops.length) {
                            expressionWithBrackets += ops[i];
                        }
                    }
                }
                
                // 计算完整表达式的结果
                const fullResult = calculateExpression(expressionWithBrackets);
                
                // 验证计算结果是有限小数
                if (fullResult === null || isNaN(fullResult) || !isFinite(fullResult) || !isFiniteDecimal(fullResult)) {
                    return null;
                }
                
                return {
                    originalExpression: expressionWithBrackets,
                    displayExpression: expressionWithBrackets,
                    result: fullResult,
                    fullResult: fullResult
                };
            }
        }

        // 生成题目
        function generateQuestions() {
            blurAllInputs(); // 生成题目时移除焦点
            
            const numQuestions = parseInt(elements.numQuestions.value) || 5;
            const numNumbers = parseInt(elements.numNumbers.value) || 2;
            const maxDigitLength = parseInt(elements.maxDigitLength.value) || 2;
            const operators = getSelectedOperators();
            const answerPositions = getSelectedAnswerPositions();
            const numberTypes = getSelectedNumberTypes();
            const useBrackets = operators.includes('()');
            
            // 确保至少选择了一个运算符（不包括括号）
            const hasValidOperator = operators.some(op => op !== '()');
            if (!hasValidOperator) {
                // 多语言提示
                const message = state.language === 'zh' ? 
                    '请至少选择一个运算符（+、-、×、÷）' : 
                    'Please select at least one operator (+, -, ×, ÷)';
                alert(message);
                return;
            }
            
            // 过滤掉括号，只保留实际运算符
            const validOperators = operators.filter(op => op !== '()');
            
            // 清空之前的题目
            elements.questionsContainer.innerHTML = '';
            state.equations = [];
            
            let generatedCount = 0;
            let totalAttempts = 0;
            const maxTotalAttempts = numQuestions * CONFIG.MAX_ATTEMPTS;
            
            while (generatedCount < numQuestions && totalAttempts < maxTotalAttempts) {
                // 随机选择答案位置
                const answerPosition = answerPositions[Math.floor(Math.random() * answerPositions.length)];
                
                // 生成表达式和答案信息，确保计算结果有效
                let exprData = null;
                let attempts = 0;
                
                while (!exprData && attempts < CONFIG.MAX_ATTEMPTS) {
                    const tempData = generateExpressionWithAnswerPosition(
                        numNumbers, validOperators, maxDigitLength, numberTypes, useBrackets, answerPosition
                    );
                    
                    // 验证结果是否有效
                    if (tempData && tempData.fullResult !== null && !isNaN(tempData.fullResult) && isFinite(tempData.fullResult)) {
                        exprData = tempData;
                    }
                    
                    attempts++;
                    totalAttempts++;
                }
                
                // 如果无法生成当前题目，跳过继续生成下一题
                if (!exprData) {
                    continue;
                }
                
                // 创建题目元素
                const equationElement = document.createElement('div');
                equationElement.className = 'equation-container';
                equationElement.dataset.index = generatedCount;
                
                // 创建题号
                const numberBadge = document.createElement('span');
                numberBadge.className = 'equation-number';
                numberBadge.textContent = generatedCount + 1;
                equationElement.appendChild(numberBadge);
                
                // 创建输入框
                const input = document.createElement('input');
                input.type = 'number';
                input.step = 'any';
                input.className = 'equation-input';
                input.dataset.index = generatedCount;
                input.placeholder = '?';
                
                // 添加键盘事件监听（回车提交）
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        checkSingleAnswer(generatedCount);
                    }
                });
                
                // 创建结果图标
                const resultIcon = document.createElement('span');
                resultIcon.className = 'result-icon';
                
                if (answerPosition === 'right') {
                    // 答案在右侧：表达式 = [输入框]
                    const expressionSpan = document.createElement('span');
                    expressionSpan.textContent = `${exprData.displayExpression}  = `;
                    equationElement.appendChild(expressionSpan);
                    equationElement.appendChild(input);
                } else {
                    // 答案在左侧：将 displayExpression 中的 ? 替换为输入框
                    // displayExpression 格式如: "3+?×2" 或 "?+5-2" 等
                    const parts = exprData.displayExpression.split('?');
                    
                    if (parts.length === 2) {
                        // 左侧部分
                        if (parts[0]) {
                            const leftSpan = document.createElement('span');
                            leftSpan.textContent = parts[0];
                            equationElement.appendChild(leftSpan);
                        }
                        
                        // 输入框（替换 ?）
                        equationElement.appendChild(input);
                        
                        // 右侧部分
                        if (parts[1]) {
                            const rightSpan = document.createElement('span');
                            rightSpan.textContent = parts[1] + ' = ' + formatNumber(exprData.fullResult);
                            equationElement.appendChild(rightSpan);
                        } else {
                            const equalSpan = document.createElement('span');
                            equalSpan.textContent = ' = ' + formatNumber(exprData.fullResult);
                            equationElement.appendChild(equalSpan);
                        }
                    } else {
                        // 如果没有 ?，使用旧格式
                        equationElement.appendChild(input);
                        const middleSpan = document.createElement('span');
                        middleSpan.textContent = ` ${exprData.displayExpression} = ${formatNumber(exprData.fullResult)}`;
                        equationElement.appendChild(middleSpan);
                    }
                }
                
                equationElement.appendChild(resultIcon);
                
                // 创建提示按钮
                const hintBtn = document.createElement('a');
                hintBtn.className = 'hint-btn';
                hintBtn.innerHTML = '💡';
                hintBtn.target = '_blank';
                hintBtn.title = translations[state.language].hintBtn;
                
                // 构建mathsteps.html的URL参数
                const currentMode = state.currentTheme === 'dark' ? 'dark-mode' : (state.currentTheme === 'eye' ? 'eye-mode' : '');
                let mathParam = '';
                
                if (answerPosition === 'right') {
                    // 右侧答案：直接使用原始表达式，去除空格
                    mathParam = exprData.originalExpression.replace(/\s+/g, '');
                } else {
                    // 左侧答案：用X代表答案位置，用equals代表等于号
                    // displayExpression格式如 "3+?×2" 或 "?+5-2"，等号右边是fullResult
                    let leftExpr = exprData.displayExpression.replace(/\?/g, 'X').replace(/\s+/g, '');
                    // 使用fullResult作为等号右边的值
                    mathParam = leftExpr + 'equals' + formatNumber(exprData.fullResult);
                }
                
                hintBtn.href = `mathsteps.html?math=${encodeURIComponent(mathParam)}`;
                equationElement.appendChild(hintBtn);
                
                elements.questionsContainer.appendChild(equationElement);
                
                // 存储题目和答案
                state.equations.push({
                    originalExpression: exprData.originalExpression,
                    displayExpression: exprData.displayExpression,
                    result: exprData.result,  // 正确答案
                    fullResult: exprData.fullResult,  // 完整表达式的结果
                    answerPosition
                });
                
                generatedCount++;
                
                // 更新进度条
                const progress = (generatedCount / numQuestions) * 100;
                elements.progressFill.style.width = `${progress}%`;
            }
            
            // 显示进度条
            elements.progressBar.style.display = 'block';
            
            // 如果生成的题目数量不足，显示警告
            if (generatedCount < numQuestions) {
                console.warn(`只生成了 ${generatedCount}/${numQuestions} 道题目，部分题目因限制条件无法生成`);
            }
            
            // 缓存输入框引用
            state.cachedInputs = document.querySelectorAll('.equation-input');
        }

        // 检查单个答案
        function checkSingleAnswer(index) {
            if (state.equations.length === 0 || index < 0 || index >= state.equations.length) return;
            
            const inputs = state.cachedInputs || document.querySelectorAll('.equation-input');
            const input = inputs[index];
            if (!input) return;
            
            const equation = state.equations[index];
            const userAnswer = parseFloat(input.value);
            const correctAnswer = equation.result;
            const resultIcon = input.parentElement.querySelector('.result-icon');
            const equationContainer = input.closest('.equation-container');
            
            // 清除之前的样式
            input.classList.remove('correct', 'incorrect');
            resultIcon.classList.remove('correct', 'incorrect');
            
            // 检查答案
            if (isNaN(userAnswer)) {
                // 未填写答案，显示提示
                resultIcon.textContent = '?';
                resultIcon.className = 'result-icon';
            } else {
                // 检查答案是否正确（考虑浮点数精度）
                const isCorrect = Math.abs(userAnswer - correctAnswer) < CONFIG.FLOAT_PRECISION;
                
                if (isCorrect) {
                    resultIcon.textContent = '✓';
                    resultIcon.className = 'result-icon correct';
                    input.classList.add('correct');
                } else {
                    resultIcon.textContent = '✗';
                    resultIcon.className = 'result-icon incorrect';
                    input.classList.add('incorrect');
                }
            }
        }
        
        // 检查所有答案
        function checkAllAnswers() {
            if (state.equations.length === 0) return;
            
            const inputs = state.cachedInputs || document.querySelectorAll('.equation-input');
            let correctCount = 0;
            let answeredCount = 0;
            
            inputs.forEach((input, index) => {
                const userAnswer = parseFloat(input.value);
                if (!isNaN(userAnswer)) {
                    answeredCount++;
                    checkSingleAnswer(index);
                    const equation = state.equations[index];
                    if (Math.abs(userAnswer - equation.result) < CONFIG.FLOAT_PRECISION) {
                        correctCount++;
                    }
                }
            });
            
            // 更新进度条显示完成度
            const progress = inputs.length > 0 ? (answeredCount / inputs.length) * 100 : 0;
            elements.progressFill.style.width = `${progress}%`;
            
            // 显示统计信息
            if (answeredCount > 0) {
                const message = state.language === 'zh' 
                    ? `答对 ${correctCount}/${answeredCount} 题，正确率 ${Math.round(correctCount/answeredCount*100)}%`
                    : `Correct: ${correctCount}/${answeredCount}, Accuracy: ${Math.round(correctCount/answeredCount*100)}%`;
                
                // 可以在这里添加一个toast提示
                console.log(message);
            }
        }
        
        // 清空所有答案
        function clearAllAnswers() {
            if (state.equations.length === 0) return;
            
            const inputs = state.cachedInputs || document.querySelectorAll('.equation-input');
            inputs.forEach((input, index) => {
                input.value = '';
                input.classList.remove('correct', 'incorrect');
                const resultIcon = input.parentElement.querySelector('.result-icon');
                if (resultIcon) {
                    resultIcon.textContent = '';
                    resultIcon.className = 'result-icon';
                }
            });
            
            // 重置进度条
            elements.progressFill.style.width = '0%';
            
            // 聚焦第一个输入框
            if (inputs.length > 0) {
                inputs[0].focus();
            }
        }

        // 显示答案
        function showAnswers() {
            blurAllInputs(); // 显示答案时移除焦点
            
            if (state.equations.length === 0) return;
            
            // 使用缓存的输入框或重新查询
            const inputs = state.cachedInputs || document.querySelectorAll('.equation-input');
            inputs.forEach((input, index) => {
                const equation = state.equations[index];
                const userAnswer = parseFloat(input.value);
                const correctAnswer = equation.result;
                const resultIcon = input.parentElement.querySelector('.result-icon');
                
                // 检查答案
                if (isNaN(userAnswer)) {
                    // 未填写答案，显示正确答案
                    resultIcon.textContent = formatNumber(correctAnswer);
                    resultIcon.className = 'result-icon text-gray-600';
                } else {
                    // 检查答案是否正确（考虑浮点数精度）
                    const isCorrect = Math.abs(userAnswer - correctAnswer) < CONFIG.FLOAT_PRECISION;
                    
                    if (isCorrect) {
                        resultIcon.textContent = '✔';
                        resultIcon.className = 'result-icon text-success';
                    } else {
                        resultIcon.textContent = `✘ ${formatNumber(correctAnswer)}`;
                        resultIcon.className = 'result-icon text-error';
                    }
                }
            });
        }

        // 格式化数字（移除不必要的.0）
        function formatNumber(num) {
            // 处理整数显示
            if (Number.isInteger(num)) {
                return num.toString();
            }
            
            // 处理小数
            const fixed = num.toFixed(CONFIG.MAX_DECIMAL_PLACES);
            // 移除末尾的0和可能的小数点
            return fixed.replace(/\.?0+$/, '');
        }



        // 切换草稿纸显示/隐藏
        function toggleNotepad() {
            elements.notepad.classList.toggle('hidden');
            elements.notepad.classList.toggle('flex');
            
            // 如果显示草稿纸，调整画布大小
            if (!elements.notepad.classList.contains('hidden')) {
                resizeCanvas();
                // 给草稿纸容器设置焦点，防止其他元素获取焦点
                elements.notepadContainer.setAttribute('tabindex', '-1');
                elements.notepadContainer.focus();
            } else {
                elements.notepadContainer.removeAttribute('tabindex');
            }
        }

        // 初始化画布
        function initCanvas() {
            const canvas = elements.drawingCanvas;
            const ctx = canvas.getContext('2d');
            
            // 设置初始尺寸
            resizeCanvas();
            
            // 设置初始背景
            elements.notepadContent.style.backgroundColor = state.currentBgColor;
            
            // 设置初始画笔属性
            ctx.strokeStyle = state.currentPenColor;
            ctx.lineWidth = state.currentPenSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            // 设置默认选中黑色画笔按钮
            if (elements.penColorBtns.length > 0) {
                updatePenColorButtons(elements.penColorBtns[0]);
            }
        }

        // 调整画布大小
        function resizeCanvas() {
            const canvas = elements.drawingCanvas;
            const container = elements.notepadContent;
            
            // 保存当前画布内容
            const data = canvas.toDataURL();
            
            // 设置画布尺寸以匹配显示尺寸
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            
            // 恢复画布内容
            if (data && data !== "data:,") {
                const img = new Image();
                img.onload = function() {
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                };
                img.src = data;
            }
        }

        // 初始化画布事件
        function initCanvasEvents() {
            const canvas = elements.drawingCanvas;
            const ctx = canvas.getContext('2d');
            
            // 鼠标/触摸开始事件
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('touchstart', (e) => {
                // 检查是否触摸在按钮上，如果是则不处理
                const touch = e.touches[0];
                const buttons = elements.notepadHeader.querySelectorAll('button');
                const isTouchOnButton = Array.from(buttons).some(button => {
                    const rect = button.getBoundingClientRect();
                    return touch.clientX >= rect.left && touch.clientX <= rect.right &&
                           touch.clientY >= rect.top && touch.clientY <= rect.bottom;
                });
                
                if (!isTouchOnButton) {
                    e.preventDefault();
                    const rect = canvas.getBoundingClientRect();
                    startDrawing({
                        offsetX: touch.clientX - rect.left,
                        offsetY: touch.clientY - rect.top
                    });
                }
            });
            
            // 鼠标/触摸移动事件
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('touchmove', (e) => {
                if (state.isDrawing) {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const rect = canvas.getBoundingClientRect();
                    draw({
                        offsetX: touch.clientX - rect.left,
                        offsetY: touch.clientY - rect.top
                    });
                }
            });
            
            // 鼠标/触摸结束事件
            window.addEventListener('mouseup', stopDrawing);
            window.addEventListener('touchend', (e) => {
                // 只有在正在绘制时才处理
                if (state.isDrawing) {
                    e.preventDefault();
                    stopDrawing();
                }
            });
            canvas.addEventListener('mouseleave', stopDrawing);
            
            // 窗口大小变化时调整画布
            window.addEventListener('resize', () => {
                if (!elements.notepad.classList.contains('hidden')) {
                    resizeCanvas();
                }
            });
        }

        // 开始绘画
        function startDrawing(e) {
            state.isDrawing = true;
            [state.lastX, state.lastY] = [e.offsetX, e.offsetY];
            
            // 开始记录新路径
            state.currentPath = [{
                x: state.lastX,
                y: state.lastY,
                type: 'start',
                color: state.currentPenColor,
                size: state.currentPenSize
            }];
        }

        // 绘画中
        function draw(e) {
            if (!state.isDrawing) return;
            
            const canvas = elements.drawingCanvas;
            const ctx = canvas.getContext('2d');
            
            ctx.beginPath();
            ctx.moveTo(state.lastX, state.lastY);
            ctx.lineTo(e.offsetX, e.offsetY);
            
            // 设置当前绘画样式
            ctx.strokeStyle = state.currentPenColor;
            ctx.lineWidth = state.currentPenSize;
            
            ctx.stroke();
            
            // 记录绘制路径
            state.currentPath.push({
                x: e.offsetX,
                y: e.offsetY,
                type: 'line',
                color: state.currentPenColor,
                size: state.currentPenSize
            });
            
            [state.lastX, state.lastY] = [e.offsetX, e.offsetY];
        }

        // 停止绘画
        function stopDrawing() {
            if (state.isDrawing && state.currentPath.length > 1) {
                state.isDrawing = false;
                // 保存当前路径到历史记录
                saveState();
            }
        }

        // 清空画布
        function clearCanvas() {
            const canvas = elements.drawingCanvas;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // 保存清空状态到历史记录
            saveState();
        }

        // 保存当前状态到历史记录
        function saveState() {
            // 防止重复保存
            if (state.isSavingState) return;
            state.isSavingState = true;
            
            setTimeout(() => {
                try {
                    const canvas = elements.drawingCanvas;
                    
                    // 如果处于历史记录中间位置，清除后面的记录
                    if (state.historyIndex < state.history.length - 1) {
                        state.history = state.history.slice(0, state.historyIndex + 1);
                    }
                    
                    // 保存当前画布状态
                    const data = canvas.toDataURL();
                    
                    // 避免保存重复状态
                    if (state.history.length === 0 || state.history[state.historyIndex] !== data) {
                        state.history.push(data);
                        
                        // 限制历史记录数量，防止内存占用过大
                        if (state.history.length > CONFIG.MAX_HISTORY) {
                            state.history.shift();
                        }
                        
                        // 更新历史记录索引
                        state.historyIndex = state.history.length - 1;
                        
                        // 更新按钮状态
                        updateHistoryButtons();
                    }
                } catch (error) {
                } finally {
                    state.isSavingState = false;
                }
            }, 100); // 短暂延迟防止快速连续保存
        }

        // 撤销操作
        function undo() {
            if (state.historyIndex > 0) {
                state.historyIndex--;
                restoreState();
            }
        }

        // 重做操作
        function redo() {
            if (state.historyIndex < state.history.length - 1) {
                state.historyIndex++;
                restoreState();
            }
        }

        // 恢复指定状态
        function restoreState() {
            const canvas = elements.drawingCanvas;
            const ctx = canvas.getContext('2d');
            
            // 清除当前画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 检查历史记录是否有效
            if (state.historyIndex >= 0 && state.historyIndex < state.history.length) {
                const data = state.history[state.historyIndex];
                
                // 确保数据有效
                if (data && data !== "data:,") {
                    const img = new Image();
                    img.onload = function() {
                        // 绘制历史状态
                        ctx.drawImage(img, 0, 0);
                        // 更新按钮状态
                        updateHistoryButtons();
                    };
                    img.onerror = function() {
                        updateHistoryButtons();
                    };
                    img.src = data;
                } else {
                    updateHistoryButtons();
                }
            }
        }

        // 更新撤销/重做按钮状态
        function updateHistoryButtons() {
            // 撤销按钮状态
            if (state.historyIndex <= 0) {
                elements.undoBtn.classList.add('opacity-50', 'cursor-not-allowed');
                elements.undoBtn.classList.remove('hover:bg-gray-200');
            } else {
                elements.undoBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                elements.undoBtn.classList.add('hover:bg-gray-200');
            }
            
            // 重做按钮状态
            if (state.historyIndex >= state.history.length - 1) {
                elements.redoBtn.classList.add('opacity-50', 'cursor-not-allowed');
                elements.redoBtn.classList.remove('hover:bg-gray-200');
            } else {
                elements.redoBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                elements.redoBtn.classList.add('hover:bg-gray-200');
            }
        }

        // 初始化拖拽和调整大小功能
        function initDragAndResize() {
            let isDragging = false;
            let isResizing = false;
            let startX, startY;
            let startWidth, startHeight;
            let containerX, containerY;
            const minWidth = 200;
            const minHeight = 200;
            
            // 拖拽开始 - 仅在标题栏上（排除按钮区域）
            elements.notepadHeader.addEventListener('mousedown', (e) => {
                // 检查点击是否在标题栏的可拖拽区域（非按钮区）
                const isButtonArea = Array.from(elements.notepadHeader.querySelectorAll('button')).some(btn => 
                    btn.contains(e.target)
                );
                
                if (e.target === elements.resizeHandle || isButtonArea) {
                    return; // 调整大小时或点击按钮时不触发拖拽
                }
                
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
                
                // 获取当前容器位置
                const rect = elements.notepadContainer.getBoundingClientRect();
                containerX = rect.left;
                containerY = rect.top;
                
                elements.notepadHeader.classList.add('dragging');
                document.body.style.userSelect = 'none';
                document.body.style.cursor = 'grabbing';
            });
            
            // 调整大小开始
            elements.resizeHandle.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                isResizing = true;
                startX = e.clientX;
                startY = e.clientY;
                
                // 获取当前容器尺寸和位置
                const rect = elements.notepadContainer.getBoundingClientRect();
                startWidth = rect.width;
                startHeight = rect.height;
                containerX = rect.left;
                containerY = rect.top;
                
                elements.resizeHandle.classList.add('resizing');
                document.body.style.userSelect = 'none';
                document.body.style.cursor = 'nwse-resize';
            });
            
            // 鼠标移动
            document.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    // 计算新位置
                    const dx = e.clientX - startX;
                    const dy = e.clientY - startY;
                    
                    // 应用新位置
                    const newX = containerX + dx;
                    const newY = containerY + dy;
                    
                    // 限制在可视区域内
                    const maxX = window.innerWidth - elements.notepadContainer.offsetWidth;
                    const maxY = window.innerHeight - elements.notepadContainer.offsetHeight;
                    
                    elements.notepadContainer.style.left = `${Math.max(0, Math.min(newX, maxX))}px`;
                    elements.notepadContainer.style.top = `${Math.max(0, Math.min(newY, maxY))}px`;
                    elements.notepadContainer.style.right = 'auto';
                    elements.notepadContainer.style.bottom = 'auto';
                    // 移除居中变换，避免干扰拖拽
                    elements.notepadContainer.style.transform = 'none';
                }
                
                if (isResizing) {
                    // 计算新尺寸（左上角手柄逻辑）
                    const dx = startX - e.clientX;
                    const dy = startY - e.clientY;
                    
                    // 计算新宽度和高度（确保不小于最小值）
                    let newWidth = startWidth + dx;
                    let newHeight = startHeight + dy;
                    newWidth = Math.max(minWidth, newWidth);
                    newHeight = Math.max(minHeight, newHeight);
                    
                    // 计算新位置（左上角手柄拖动时调整位置）
                    let newX = containerX - dx;
                    let newY = containerY - dy;
                    
                    // 限制最大宽度不超过95vw
                    const maxWidth = window.innerWidth * 0.95;
                    newWidth = Math.min(newWidth, maxWidth);
                    
                    // 确保容器不会超出屏幕左侧和顶部
                    newX = Math.max(0, newX);
                    newY = Math.max(0, newY);
                    
                    // 确保容器不会超出屏幕右侧和底部
                    const maxX = window.innerWidth - newWidth;
                    const maxY = window.innerHeight - newHeight;
                    newX = Math.min(newX, maxX);
                    newY = Math.min(newY, maxY);
                    
                    // 应用新尺寸和位置
                    elements.notepadContainer.style.width = `${newWidth}px`;
                    elements.notepadContainer.style.height = `${newHeight}px`;
                    elements.notepadContainer.style.left = `${newX}px`;
                    elements.notepadContainer.style.top = `${newY}px`;
                    elements.notepadContainer.style.right = 'auto';
                    elements.notepadContainer.style.bottom = 'auto';
                    elements.notepadContainer.style.transform = 'none';
                    
                    // 调整画布大小
                    resizeCanvas();
                }
            });
            
            // 鼠标释放
            document.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    elements.notepadHeader.classList.remove('dragging');
                    document.body.style.userSelect = '';
                    document.body.style.cursor = '';
                }
                
                if (isResizing) {
                    isResizing = false;
                    elements.resizeHandle.classList.remove('resizing');
                    document.body.style.userSelect = '';
                    document.body.style.cursor = '';
                }
            });
            
            // 触摸设备支持
            let touchIdentifier = null;
            
            // 触摸开始 - 拖拽
            elements.notepadHeader.addEventListener('touchstart', (e) => {
                // 检查是否触摸在按钮上
                const touch = e.touches[0];
                const buttons = elements.notepadHeader.querySelectorAll('button');
                const isTouchOnButton = Array.from(buttons).some(button => {
                    const rect = button.getBoundingClientRect();
                    return touch.clientX >= rect.left && touch.clientX <= rect.right &&
                           touch.clientY >= rect.top && touch.clientY <= rect.bottom;
                });
                
                if (e.target === elements.resizeHandle || isTouchOnButton) {
                    return; // 调整大小时或点击按钮时不触发拖拽
                }
                
                isDragging = true;
                touchIdentifier = touch.identifier;
                startX = touch.clientX;
                startY = touch.clientY;
                
                const rect = elements.notepadContainer.getBoundingClientRect();
                containerX = rect.left;
                containerY = rect.top;
                
                elements.notepadHeader.classList.add('dragging');
                document.body.style.userSelect = 'none';
            });
            
            // 调整大小触摸开始
            elements.resizeHandle.addEventListener('touchstart', (e) => {
                e.stopPropagation();
                isResizing = true;
                const touch = e.touches[0];
                touchIdentifier = touch.identifier;
                startX = touch.clientX;
                startY = touch.clientY;
                
                const rect = elements.notepadContainer.getBoundingClientRect();
                startWidth = rect.width;
                startHeight = rect.height;
                containerX = rect.left;
                containerY = rect.top;
                
                elements.resizeHandle.classList.add('resizing');
                document.body.style.userSelect = 'none';
            });
            
            // 触摸移动
            document.addEventListener('touchmove', (e) => {
                if (!touchIdentifier) return;
                
                const touch = Array.from(e.touches).find(t => t.identifier === touchIdentifier);
                if (!touch) return;
                
                if (isDragging) {
                    const dx = touch.clientX - startX;
                    const dy = touch.clientY - startY;
                    
                    const newX = containerX + dx;
                    const newY = containerY + dy;
                    
                    const maxX = window.innerWidth - elements.notepadContainer.offsetWidth;
                    const maxY = window.innerHeight - elements.notepadContainer.offsetHeight;
                    
                    elements.notepadContainer.style.left = `${Math.max(0, Math.min(newX, maxX))}px`;
                    elements.notepadContainer.style.top = `${Math.max(0, Math.min(newY, maxY))}px`;
                    elements.notepadContainer.style.transform = 'none';
                    e.preventDefault();
                }
                
                if (isResizing) {
                    const dx = startX - touch.clientX;
                    const dy = startY - touch.clientY;
                    
                    let newWidth = startWidth + dx;
                    let newHeight = startHeight + dy;
                    newWidth = Math.max(minWidth, newWidth);
                    newHeight = Math.max(minHeight, newHeight);
                    
                    // 限制最大宽度
                    const maxWidth = window.innerWidth * 0.95;
                    newWidth = Math.min(newWidth, maxWidth);
                    
                    let newX = containerX - dx;
                    let newY = containerY - dy;
                    
                    // 边界检查
                    newX = Math.max(0, newX);
                    newY = Math.max(0, newY);
                    
                    const maxX = window.innerWidth - newWidth;
                    const maxY = window.innerHeight - newHeight;
                    newX = Math.min(newX, maxX);
                    newY = Math.min(newY, maxY);
                    
                    elements.notepadContainer.style.width = `${newWidth}px`;
                    elements.notepadContainer.style.height = `${newHeight}px`;
                    elements.notepadContainer.style.left = `${newX}px`;
                    elements.notepadContainer.style.top = `${newY}px`;
                    elements.notepadContainer.style.transform = 'none';
                    
                    resizeCanvas();
                    e.preventDefault();
                }
            });
            
            // 触摸结束
            document.addEventListener('touchend', (e) => {
                if (touchIdentifier && 
                    Array.from(e.changedTouches).some(t => t.identifier === touchIdentifier)) {
                    
                    if (isDragging) {
                        isDragging = false;
                        elements.notepadHeader.classList.remove('dragging');
                        document.body.style.userSelect = '';
                    }
                    
                    if (isResizing) {
                        isResizing = false;
                        elements.resizeHandle.classList.remove('resizing');
                        document.body.style.userSelect = '';
                    }
                    
                    touchIdentifier = null;
                }
            });
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
